<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>TEST LOGIN</title>
</head>

<body>

<h2>TEST LOGIN</h2>

<input id="user" placeholder="scrivi andrea o matteo">
<button onclick="login()">ENTRA</button>

<div id="out"></div>

<script>

function login(){
    const u = document.getElementById("user").value.trim().toLowerCase();

    document.getElementById("out").innerHTML =
        "Hai scritto: " + u;

    if(u === "andrea"){
        document.getElementById("out").innerHTML += "<br>ACCESSO ANDREA OK";
    }
    else if(u === "matteo"){
        document.getElementById("out").innerHTML += "<br>ACCESSO MATTEO OK";
    }
    else{
        document.getElementById("out").innerHTML += "<br>UTENTE NON VALIDO";
    }
}

</script>

</body>
</html>

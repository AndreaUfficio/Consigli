<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIGLI</title>

<style>
body{
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background:#f4f4f4;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px;
    cursor:pointer;
}

.small{
    background:#fff;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>CONSIGLI</h1>

<div class="card" id="loginBox">
<h2>Login</h2>
<input id="user" placeholder="andrea o matteo">
<button onclick="login()">Entra</button>
</div>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =======================
   SUPABASE SAFE INIT
======================= */
const supabaseUrl = "https://ldcnfgmqrwhdwyylfejx.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkY25mZ21xcndoZHd5eWxmZWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTUyNjUsImV4cCI6MjA5NzkzMTI2NX0.EvEJjK40eQZ117n1gS5-zIeNiHcuTkpyT8W4i5EwyKQ";

let supabase = null;

window.addEventListener("load", () => {
    try {
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        console.log("Supabase OK");
    } catch (e) {
        console.error("Errore Supabase:", e);
    }
});

/* =======================
   STATE
======================= */
let currentUser = "";

/* =======================
   LOGIN
======================= */
function login(){

const user = document.getElementById("user").value.trim().toLowerCase();

if(user !== "andrea" && user !== "matteo"){
alert("Scrivi andrea o matteo");
return;
}

currentUser = user;

document.getElementById("loginBox").style.display = "none";

renderUI();

setTimeout(loadData, 100);
}

/* =======================
   SAVE
======================= */
async function save(){

if(!supabase){
alert("Supabase non pronto");
return;
}

const contenuto = document.getElementById("contenuto").value;
const commento = document.getElementById("commento").value;
const voto = document.getElementById("voto").value;

const { error } = await supabase.from("consigli").insert([{
user: currentUser,
contenuto,
commento,
voto,
date: new Date().toLocaleString()
}]);

if(error){
console.error(error);
alert("Errore salvataggio");
return;
}

loadData();
}

/* =======================
   LOAD
======================= */
async function loadData(){

if(!supabase) return;

const { data, error } = await supabase
.from("consigli")
.select("*")
.eq("user", currentUser)
.order("id", { ascending:false });

if(error){
console.error(error);
return;
}

let html = "<h3>Storico</h3>";

if(!data || data.length === 0){
document.getElementById("history").innerHTML = "<p>Nessun dato</p>";
return;
}

data.forEach(d => {
html += `
<div class="small">
<b>${d.contenuto}</b><br>
${d.commento}<br>
Voto: ${d.voto}<br>
<small>${d.date}</small>
</div>
`;
});

document.getElementById("history").innerHTML = html;
}

/* =======================
   UI
======================= */
function renderUI(){

if(currentUser === "andrea"){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Andrea</h2>

<label>Album</label>
<input id="contenuto">

<label>Commento film Matteo</label>
<textarea id="commento"></textarea>

<label>Voto 0-5</label>
<select id="voto">
<option>0</option><option>0.5</option><option>1</option><option>1.5</option>
<option>2</option><option>2.5</option><option>3</option><option>3.5</option>
<option>4</option><option>4.5</option><option>5</option>
</select>

<button onclick="save()">Salva</button>
</div>

<div class="card">
<div id="history"></div>
</div>
`;
}

if(currentUser === "matteo"){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Matteo</h2>

<label>Film</label>
<input id="contenuto">

<label>Commento album Andrea</label>
<textarea id="commento"></textarea>

<label>Voto 0-10</label>
<select id="voto">
<option>0</option><option>0.5</option><option>1</option><option>1.5</option>
<option>2</option><option>2.5</option><option>3</option><option>3.5</option>
<option>4</option><option>4.5</option><option>5</option>
<option>5.5</option><option>6</option><option>6.5</option><option>7</option>
<option>7.5</option><option>8</option><option>8.5</option><option>9</option>
<option>9.5</option><option>10</option>
</select>

<button onclick="save()">Salva</button>
</div>

<div class="card">
<div id="history"></div>
</div>
`;
}

}

</script>

</body>
</html>

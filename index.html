<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIGLI</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

.card{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
}

button{
    padding: 10px;
    cursor: pointer;
}

h1{text-align:center;}
</style>
</head>

<body>

<h1>CONSIGLI</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>

<input id="user" placeholder="Scrivi: andrea o matteo">
<button onclick="login()">Entra</button>
</div>

<!-- APP -->
<div id="app"></div>

<script>

/* LOGIN SEMPLICE */
function login(){

const user = document.getElementById("user").value.trim().toLowerCase();

if(user !== "andrea" && user !== "matteo"){
alert("Scrivi solo andrea o matteo");
return;
}

document.getElementById("loginBox").style.display = "none";

if(user === "andrea"){
renderAndrea();
}

if(user === "matteo"){
renderMatteo();
}

}

/* ANDREA */
function renderAndrea(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Andrea</h2>

<p>👉 Qui vedrai e gestirai i consigli per Matteo</p>

<label>Album della settimana</label>
<input>

<label>Commento film di Matteo</label>
<textarea></textarea>

<label>Voto film (0-5)</label>
<input type="number" min="0" max="5">

<button onclick="alert('Salvataggio ancora non attivo')">Salva</button>
</div>
`;
}

/* MATTEO */
function renderMatteo(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Matteo</h2>

<p>👉 Qui vedrai e gestirai i consigli per Andrea</p>

<label>Film della settimana</label>
<input>

<label>Commento album di Andrea</label>
<textarea></textarea>

<label>Voto album (0-10)</label>
<input type="number" min="0" max="10">

<button onclick="alert('Salvataggio ancora non attivo')">Salva</button>
</div>
`;
}

</script>

</body>
</html>

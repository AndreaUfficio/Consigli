<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIGLI</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

.card{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea, select{
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button{
    padding: 10px 20px;
    cursor: pointer;
}

h1{
    text-align: center;
}
</style>
</head>

<body>

<h1>CONSIGLI</h1>
<p style="text-align:center">Sito creato per consigliare film e album</p>

<div class="card">
<h2>Login</h2>

<label>Utente</label>
<input id="user">

<label>Password</label>
<input id="password" type="password">

<button onclick="login()">Accedi</button>
</div>

<div id="area"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://ldcnfgmqrwhdwyylfejx.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkY25mZ21xcndoZHd5eWxmZWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTUyNjUsImV4cCI6MjA5NzkzMTI2NX0.EvEJjK40eQZ117n1gS5-zIeNiHcuTkpyT8W4i5EwyKQ";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// LOGIN FINTA SEMPLICE
function login(){
    const user = document.getElementById("user").value;

    let html = "";

    if(user === "andrea"){
        html = `
        <div class="card">
        <h2>Area Andrea</h2>

        <label>Album della settimana per Matteo</label>
        <input id="album">

        <label>Commenti sul film di Matteo</label>
        <textarea id="commento"></textarea>

        <label>Valutazione film (0-5)</label>
        <select id="voto">
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        </select>

        <button onclick="salva('andrea','album')">Salva</button>
        </div>
        `;
    }

    else if(user === "matteo"){
        html = `
        <div class="card">
        <h2>Area Matteo</h2>

        <label>Film della settimana per Andrea</label>
        <input id="film">

        <label>Commenti sull'album di Andrea</label>
        <textarea id="commento"></textarea>

        <label>Valutazione album (0-10)</label>
        <input id="voto" type="number" min="0" max="10">

        <button onclick="salva('matteo','film')">Salva</button>
        </div>
        `;
    }

    else{
        html = "<p>Utente non riconosciuto</p>";
    }

    document.getElementById("area").innerHTML = html;
}

// SALVATAGGIO SUPABASE
async function salva(user, tipo){

    let contenuto = "";
    let commento = "";
    let voto = "";

    if(user === "andrea"){
        contenuto = document.getElementById("album").value;
        commento = document.getElementById("commento").value;
        voto = document.getElementById("voto").value;
    }

    if(user === "matteo"){
        contenuto = document.getElementById("film").value;
        commento = document.getElementById("commento").value;
        voto = document.getElementById("voto").value;
    }

    const { error } = await supabase
        .from("consigli")
        .insert([
            {
                user: user,
                tipo: tipo,
                contenuto: contenuto,
                commento: commento,
                voto: voto
            }
        ]);

    if(error){
        alert("Errore salvataggio");
        console.log(error);
    } else {
        alert("Salvato con successo!");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIGLI</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

.card{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
}

button{
    padding: 10px;
    cursor: pointer;
}

h1{text-align:center;}

.small{
    font-size: 14px;
    background: #fff;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>CONSIGLI</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>

<input id="user" placeholder="scrivi: andrea o matteo">
<button onclick="handleLogin()">Entra</button>
</div>

<div id="app"></div>

<script>

let currentUser = "";

/* LOGIN */
function handleLogin(){

const user = document.getElementById("user").value.trim().toLowerCase();

if(user !== "andrea" && user !== "matteo"){
alert("Scrivi andrea o matteo");
return;
}

currentUser = user;

document.getElementById("loginBox").style.display = "none";

if(user === "andrea") showAndrea();
if(user === "matteo") showMatteo();

loadData();

}

/* SALVATAGGIO */
function save(){

let data = JSON.parse(localStorage.getItem(currentUser)) || [];

let contenuto = document.getElementById("contenuto").value;
let commento = document.getElementById("commento").value;
let voto = document.getElementById("voto").value;

data.push({
contenuto,
commento,
voto,
date: new Date().toLocaleString()
});

localStorage.setItem(currentUser, JSON.stringify(data));

loadData();

alert("Salvato!");
}

/* CARICA STORICO */
function loadData(){

let data = JSON.parse(localStorage.getItem(currentUser)) || [];

let html = "<h3>Storico</h3>";

data.reverse().forEach(d => {
html += `
<div class="small">
<b>${d.contenuto}</b><br>
${d.commento}<br>
Voto: ${d.voto}<br>
<small>${d.date}</small>
</div>
`;
});

document.getElementById("history").innerHTML = html;
}

/* ANDREA */
function showAndrea(){

document.getElementById("app").innerHTML = `
<div class="card">
<h2>Andrea</h2>

<label>Album da consigliare</label>
<input id="contenuto">

<label>Commento film Matteo</label>
<textarea id="commento"></textarea>

<label>Voto film (0-5)</label>
<select id="voto">
<option value="0">0</option>
<option value="0.5">0.5</option>
<option value="1">1</option>
<option value="1.5">1.5</option>
<option value="2">2</option>
<option value="2.5">2.5</option>
<option value="3">3</option>
<option value="3.5">3.5</option>
<option value="4">4</option>
<option value="4.5">4.5</option>
<option value="5">5</option>
</select>
<button onclick="save()">Salva</button>
</div>

<div class="card">
<h3>Archivio Andrea</h3>
<div id="history"></div>
</div>
`;
}

/* MATTEO */
function showMatteo(){

document.getElementById("app").innerHTML = `
<div class="card">
<h2>Matteo</h2>

<label>Film da consigliare</label>
<input id="contenuto">

<label>Commento album Andrea</label>
<textarea id="commento"></textarea>

<label>Voto album (0-10)</label>
<input id="voto" type="number" min="0" max="10">

<button onclick="save()">Salva</button>
</div>

<div class="card">
<h3>Archivio Matteo</h3>
<div id="history"></div>
</div>
`;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIGLI</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

.card{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button{
    padding: 8px;
    cursor: pointer;
    margin-top: 5px;
}

.item{
    background:#fff;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>CONSIGLI</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>
<input id="user" placeholder="andrea o matteo">
<button onclick="login()">Entra</button>

<h3>Storico generale (prima del login)</h3>
<div id="publicHistory"></div>
</div>

<!-- APP -->
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* ===== SUPABASE ===== */
const supabaseUrl = "https://ldcnfgmqrwhdwyylfejx.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkY25mZ21xcndoZHd5eWxmZWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTUyNjUsImV4cCI6MjA5NzkzMTI2NX0.EvEJjK40eQZ117n1gS5-zIeNiHcuTkpyT8W4i5EwyKQ";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = "";

/* ===== LOAD PUBBLICO ===== */
async function loadPublic(){

const { data } = await supabase
.from("consigli")
.select("*")
.order("id", { ascending:false });

renderList(data, "publicHistory", true);
}

/* ===== LOGIN ===== */
function login(){

const u = document.getElementById("user").value.trim().toLowerCase();

if(u !== "andrea" && u !== "matteo"){
alert("Scrivi andrea o matteo");
return;
}

currentUser = u;

document.getElementById("loginBox").style.display = "none";

if(u === "andrea") renderAndrea();
if(u === "matteo") renderMatteo();

loadUser();
}

/* ===== ANDREA ===== */
function renderAndrea(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Andrea</h2>

<input id="contenuto" placeholder="album">
<textarea id="commento" placeholder="commento"></textarea>

<select id="voto">
<option>0</option><option>0.5</option><option>1</option><option>1.5</option>
<option>2</option><option>2.5</option><option>3</option><option>3.5</option>
<option>4</option><option>4.5</option><option>5</option>
</select>

<button onclick="save()">Salva</button>
</div>

<h3>Il tuo storico</h3>
<div id="history"></div>
`;
}

/* ===== MATTEO ===== */
function renderMatteo(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Matteo</h2>

<input id="contenuto" placeholder="film">
<textarea id="commento" placeholder="commento"></textarea>

<select id="voto">
<option>0</option><option>0.5</option><option>1</option><option>1.5</option>
<option>2</option><option>2.5</option><option>3</option><option>3.5</option>
<option>4</option><option>4.5</option><option>5</option>
<option>5.5</option><option>6</option><option>6.5</option>
<option>7</option><option>7.5</option><option>8</option>
<option>8.5</option><option>9</option><option>9.5</option><option>10</option>
</select>

<button onclick="save()">Salva</button>
</div>

<h3>Il tuo storico</h3>
<div id="history"></div>
`;
}

/* ===== SAVE ===== */
async function save(){

const contenuto = document.getElementById("contenuto").value;
const commento = document.getElementById("commento").value;
const voto = document.getElementById("voto").value;

const tipo = currentUser === "andrea" ? "album" : "film";

const { error } = await supabase
.from("consigli")
.insert([{
user: currentUser,
tipo,
contenuto,
commento,
voto
}]);

if(error){
alert("Errore salvataggio");
console.log(error);
return;
}

loadUser();
loadPublic();
}

/* ===== LOAD USER ===== */
async function loadUser(){

const { data } = await supabase
.from("consigli")
.select("*")
.eq("user", currentUser)
.order("id", { ascending:false });

renderList(data, "history", false);
}

/* ===== DELETE ===== */
async function removeItem(id){

await supabase
.from("consigli")
.delete()
.eq("id", id);

loadUser();
loadPublic();
}

/* ===== RENDER LIST ===== */
function renderList(data, target, canDelete){

let html = "";

data.forEach(d => {

html += `
<div class="item">
<b>${d.user}</b> - ${d.tipo}<br>
${d.contenuto}<br>
${d.commento}<br>
Voto: ${d.voto}<br>

${canDelete ? "" : `<button onclick="removeItem(${d.id})">Elimina</button>`}
</div>
`;

});

document.getElementById(target).innerHTML = html;
}

/* ===== INIT ===== */
loadPublic();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIGLI</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

.card{
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button{
    padding: 10px;
    cursor: pointer;
}
h1{text-align:center;}
</style>
</head>

<body>

<h1>CONSIGLI</h1>

<div class="card">
<h2>Login</h2>

<input id="user" placeholder="andrea / matteo">
<input id="pass" type="password" placeholder="password (qualsiasi)">
<button id="loginBtn">Accedi</button>
</div>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */
const supabaseUrl = "https://ldcnfgmqrwhdwyylfejx.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkY25mZ21xcndoZHd5eWxmZWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTUyNjUsImV4cCI6MjA5NzkzMTI2NX0.EvEJjK40eQZ117n1gS5-zIeNiHcuTkpyT8W4i5EwyKQ";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = "";

/* LOGIN (EVENT LISTENER, NON onclick) */
document.getElementById("loginBtn").addEventListener("click", () => {

const u = document.getElementById("user").value.trim();

if(u !== "andrea" && u !== "matteo"){
document.getElementById("app").innerHTML = "<p>Utente non valido</p>";
return;
}

currentUser = u;

if(u === "andrea") renderAndrea();
if(u === "matteo") renderMatteo();

});

/* ANDREA */
function renderAndrea(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Andrea</h2>

<label>Album per Matteo</label>
<input id="contenuto">

<label>Commento film Matteo</label>
<textarea id="commento"></textarea>

<label>Voto film (0-5)</label>
<input id="voto" type="number" min="0" max="5">

<button onclick="salva()">Salva</button>
</div>
`;
}

/* MATTEO */
function renderMatteo(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Matteo</h2>

<label>Film per Andrea</label>
<input id="contenuto">

<label>Commento album Andrea</label>
<textarea id="commento"></textarea>

<label>Voto album (0-10)</label>
<input id="voto" type="number" min="0" max="10">

<button onclick="salva()">Salva</button>
</div>
`;
}

/* SALVA */
async function salva(){

const contenuto = document.getElementById("contenuto").value;
const commento = document.getElementById("commento").value;
const voto = document.getElementById("voto").value;

const tipo = currentUser === "andrea" ? "album" : "film";

const { error } = await supabase
.from("consigli")
.insert([{
user: currentUser,
tipo: tipo,
contenuto: contenuto,
commento: commento,
voto: voto
}]);

if(error){
alert("Errore salvataggio");
console.log(error);
}else{
alert("Salvato!");
}

}

</script>

</body>
</html>
